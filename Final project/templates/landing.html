{% extends "base.html" %}

{% block title %}Welcome | {{ site_name }}{% endblock %}

{% block content %}
<section class="landing-center">
    <div class="hero-panel landing-panel-grid">
        <a class="bubble-card landing-action-card" href="{{ url_for('participant_login') }}">

    </div>

{% endblock %}
