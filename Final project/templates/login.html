{% extends "base.html" %}

{% block title %}Participant Login | College Event Portal{% endblock %}

{% block content %}
<section class="split-auth">
    <form class="auth-card" method="post">
        <p class="eyebrow">Login</p>
        <h1>Portal login</h1>
        <p>Select Signup to create New Account.</p>

        <label for="identifier">Username, email, or phone</label>
        <input id="identifier" name="identifier" type="text" placeholder="Enter username, email, phone, or registration number" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required>

        <label class="check-row">
            <input class="password-toggle" data-target="password" type="checkbox">
            <span>Show password</span>
        </label>

        <button class="primary-button" type="submit">Log In</button>
    </form>
    <div class="login-slogan-text">
        <span class="word-manage">Manage</span>
        <span class="word-participate">Participate</span>
        <span class="word-celebrate">Celebrate</span>
    </div>
</section>
{% endblock %}
